<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Eid Mubarak  From Sourav Debnath</title>
  
  <!-- Premium Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800;900&display=swap" rel="stylesheet">
  
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Outfit', 'sans-serif'],
          }
        }
      }
    }
  </script>

  <style>
    /* --- Background & Atmospheric Animations --- */
    @keyframes skyGlow {
      0%, 100% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
    }

    @keyframes cloudMoveFast {
      from { transform: translateX(-350px); }
      to { transform: translateX(1300px); }
    }

    @keyframes cloudMoveSlow {
      from { transform: translateX(-400px); }
      to { transform: translateX(1300px); }
    }

    @keyframes birdFly {
      0% { transform: translateX(-150px) translateY(40px) scale(0.6); opacity: 0; }
      10% { opacity: 0.9; }
      50% { transform: translateX(550px) translateY(-20px) scale(0.75); opacity: 0.9; }
      90% { opacity: 0.9; }
      100% { transform: translateX(1300px) translateY(30px) scale(0.6); opacity: 0; }
    }

    @keyframes birdWing {
      0%, 100% { transform: rotate(20deg); }
      50% { transform: rotate(-22deg); }
    }

    /* --- Synchronized Walking Timeline (0% to 42% = 5.04 seconds) --- */
    /* Entire scene moves forward and stops at 42% */
    @keyframes walkScene {
      0% { transform: translateX(-280px); }
      42% { transform: translateX(140px); }
      100% { transform: translateX(140px); }
    }

    /* Cow bobs 7 full cycles during the walk phase (period = 6% / 0.72s) and stops */
    @keyframes cowBob {
      0%, 6%, 12%, 18%, 24%, 30%, 36%, 42% { transform: translateY(0); }
      3%, 9%, 15%, 21%, 27%, 33%, 39% { transform: translateY(-7px); }
      43%, 100% { transform: translateY(0); }
    }

    /* Cow legs swing back/forth during walk, then return to normal at 42% */
    @keyframes cowLegSwingA {
      0%, 12%, 24%, 36% { transform: rotate(14deg); }
      6%, 18%, 30%, 42% { transform: rotate(-12deg); }
      43%, 100% { transform: rotate(0deg); }
    }

    @keyframes cowLegSwingB {
      0%, 12%, 24%, 36% { transform: rotate(-12deg); }
      6%, 18%, 30%, 42% { transform: rotate(14deg); }
      43%, 100% { transform: rotate(0deg); }
    }

    /* Cow tail swings during walk, shoots up in surprise at kick (42%), then relaxes */
    @keyframes cowTailSwing {
      0%, 12%, 24%, 36% { transform: rotate(-8deg); }
      6%, 18%, 30% { transform: rotate(15deg); }
      42% { transform: rotate(-55deg); }
      50% { transform: rotate(5deg); }
      100% { transform: rotate(0deg); }
    }

    /* Cow rear kicking leg swings back violently at 42% and returns at 52% */
    @keyframes cowKick {
      0%, 12%, 24%, 36% { transform: rotate(-6deg); }
      6%, 18%, 30% { transform: rotate(10deg); }
      38% { transform: rotate(0deg); }
      42% { transform: rotate(62deg) translate(-22px, -36px); } /* Violent backward kick */
      47% { transform: rotate(-10deg); }
      52%, 100% { transform: rotate(0deg); }
    }

    /* Man legs swing 8 full cycles during walk phase (period = 5.25% / 0.63s), */
    /* then snap into a funny surprised flail pose at impact (42%) */
    @keyframes manWalkLegA {
      0%, 10.5%, 21%, 31.5%, 42% { transform: rotate(18deg); }
      5.25%, 15.75%, 26.25%, 36.75% { transform: rotate(-18deg); }
      42.5%, 100% { transform: rotate(-40deg) translate(-15px, 8px); } /* Back flail */
    }

    @keyframes manWalkLegB {
      0%, 10.5%, 21%, 31.5%, 42% { transform: rotate(-18deg); }
      5.25%, 15.75%, 26.25%, 36.75% { transform: rotate(18deg); }
      42.5%, 100% { transform: rotate(55deg) translate(15px, 8px); } /* Front flail */
    }

    @keyframes manWalkArmA {
      0%, 10.5%, 21%, 31.5%, 42% { transform: rotate(-20deg); }
      5.25%, 15.75%, 26.25%, 36.75% { transform: rotate(20deg); }
      42.5%, 100% { transform: rotate(-115deg); } /* Snatched up in surprise */
    }

    @keyframes manWalkArmB {
      0%, 10.5%, 21%, 31.5%, 42% { transform: rotate(20deg); }
      5.25%, 15.75%, 26.25%, 36.75% { transform: rotate(-20deg); }
      42.5%, 100% { transform: rotate(115deg); } /* Snatched up in surprise */
    }

    /* --- Flying & Cinematic Impact Animations (42% to 100%) --- */
    /* Man flies along a beautiful high parabolic bezier curve and spins wildly */
    @keyframes manFly {
      0% { transform: translate(0, 0) rotate(0deg) scale(1); opacity: 1; }
      42% { transform: translate(0, 0) rotate(0deg) scale(1); opacity: 1; }
      43% { transform: translate(-25px, -20px) rotate(-20deg) scale(1); opacity: 1; } /* Instant impact */
      52% { transform: translate(160px, -330px) rotate(320deg) scale(0.95); opacity: 1; } /* Rising */
      66% { transform: translate(480px, -510px) rotate(680deg) scale(0.85); opacity: 1; } /* Zenith */
      82% { transform: translate(800px, -380px) rotate(1040deg) scale(0.7); opacity: 0.85; } /* Descending */
      96% { transform: translate(1080px, -180px) rotate(1320deg) scale(0.55); opacity: 0; } /* Offscreen */
      100% { transform: translate(1080px, -180px) rotate(1320deg) scale(0.55); opacity: 0; }
    }

    /* Man's ground shadow fades out completely as he flies away */
    @keyframes manShadowFade {
      0%, 42% { opacity: 0.16; transform: scale(1); }
      52% { opacity: 0; transform: scale(0.3); }
      100% { opacity: 0; }
    }

    /* Visual speed lines popping when cow kicks */
    @keyframes motionLinesPop {
      0%, 41.5% { opacity: 0; stroke-dashoffset: 100; }
      42% { opacity: 1; stroke-dashoffset: 0; }
      45% { opacity: 0; stroke-dashoffset: -100; }
      100% { opacity: 0; }
    }

    /* Scaling burst shape at the impact contact point */
    @keyframes impactBurstPop {
      0%, 41.5% { transform: scale(0); opacity: 0; }
      42% { transform: scale(1.3); opacity: 1; }
      44% { transform: scale(1.7); opacity: 0; }
      100% { opacity: 0; }
    }

    /* Cinematic "KICK!" text explosion */
    @keyframes kickLabelText {
      0%, 41.5% { transform: scale(0) rotate(-15deg); opacity: 0; }
      42% { transform: scale(1.25) rotate(-10deg); opacity: 1; }
      50% { transform: scale(1.4) rotate(12deg); opacity: 0; }
      100% { opacity: 0; }
    }

    /* Expanding road dust cloud */
    @keyframes dustCloudPop {
      0%, 41.5% { transform: scale(0); opacity: 0; }
      42% { transform: scale(1.0); opacity: 0.9; }
      53% { transform: scale(2.2) translate(-25px, -10px); opacity: 0; }
      100% { opacity: 0; }
    }

    /* --- Festive Eid Moon Arrive & Twinkle (52% to 100%) --- */
    @keyframes moonArrival {
      0%, 52% { opacity: 0; transform: translateY(-70px) scale(0.75); }
      66% { opacity: 1; transform: translateY(0) scale(1.04); }
      75%, 100% { opacity: 1; transform: translateY(0) scale(1); }
    }

    @keyframes labelFadeIn {
      0%, 58% { opacity: 0; transform: translateY(12px); }
      70%, 100% { opacity: 1; transform: translateY(0); }
    }

    @keyframes sparkleTwinkle {
      0%, 100% { opacity: 0.3; transform: scale(0.85) rotate(0deg); }
      50% { opacity: 1; transform: scale(1.3) rotate(45deg); }
    }

    /* --- Scene Class Application --- */
    .scene-bg-gradient {
      background: linear-gradient(180deg, #42C8FF 0%, #67D9FF 38%, #9CEAFF 70%, #EAFBFF 100%);
      background-size: 100% 100%;
    }

    .cloud-fast { animation: cloudMoveFast 38s linear infinite; }
    .cloud-slow { animation: cloudMoveSlow 52s linear infinite; }
    .bird-fly-group { animation: birdFly 11.5s linear infinite; }
    .bird-wing-path { animation: birdWing 0.5s ease-in-out infinite; transform-origin: center bottom; }

    .walk-scene-container { animation: walkScene 12s linear infinite; }
    .cow-body-group { animation: cowBob 12s ease-in-out infinite; transform-origin: center bottom; }
    
    .front-leg-a { animation: cowLegSwingA 12s ease-in-out infinite; transform-origin: 700px 520px; }
    .front-leg-b { animation: cowLegSwingB 12s ease-in-out infinite; transform-origin: 660px 520px; }
    .back-leg-a { animation: cowLegSwingB 12s ease-in-out infinite; transform-origin: 360px 520px; }
    .kick-leg { animation: cowKick 12s ease-in-out infinite; transform-origin: 320px 520px; }
    .cow-tail-path { animation: cowTailSwing 12s ease-in-out infinite; transform-origin: 245px 425px; }

    .man-fly-group { animation: manFly 12s cubic-bezier(0.15, 0.85, 0.3, 1) infinite; transform-origin: 170px 520px; }
    .man-shadow { animation: manShadowFade 12s ease-out infinite; transform-origin: 170px 686px; }
    .man-leg-a { animation: manWalkLegA 12s ease-in-out infinite; transform-origin: 150px 575px; }
    .man-leg-b { animation: manWalkLegB 12s ease-in-out infinite; transform-origin: 175px 575px; }
    .man-arm-a { animation: manWalkArmA 12s ease-in-out infinite; transform-origin: 130px 470px; }
    .man-arm-b { animation: manWalkArmB 12s ease-in-out infinite; transform-origin: 210px 470px; }

    .motion-lines { animation: motionLinesPop 12s ease-out infinite; }
    .impact-burst { animation: impactBurstPop 12s ease-out infinite; }
    .kick-label { animation: kickLabelText 12s cubic-bezier(0.175, 0.885, 0.32, 1.275) infinite; transform-origin: 220px 440px; }
    .dust-cloud { animation: dustCloudPop 12s ease-out infinite; transform-origin: 210px 650px; }

    .eid-moon-group { animation: moonArrival 12s cubic-bezier(0.25, 1, 0.5, 1) infinite; transform-origin: 1000px 135px; }
    .eid-label { animation: labelFadeIn 12s ease-out infinite; }
    .sparkle { animation: sparkleTwinkle 1.6s ease-in-out infinite; transform-origin: center; }
  </style>
</head>
<body class="min-h-screen bg-slate-950 text-white font-sans overflow-x-hidden">

        </svg>

        <h1 class="text-xl font-extrabold tracking-tight bg-gradient-to-r from-white via-amber-100 to-amber-300 bg-clip-text text-transparent md:text-2xl">

        <h2 class="max-w-3xl text-4xl font-black leading-tight tracking-tight bg-gradient-to-br from-white via-slate-100 to-slate-300 bg-clip-text text-transparent md:text-5xl lg:text-6xl">
          Send Salami bkash:
          01614981899
        </h2>
      </div>
    
    </section>

    <!-- --- Interactive Animation Container --- -->
    <section
      id="canvasSection"
      class="scene-bg-gradient relative h-[720px] overflow-hidden rounded-[2.5rem] border border-white/10 shadow-2xl shadow-black/80 ring-1 ring-white/10"
    >
      <svg
        id="sceneSvg"
        viewBox="0 0 1200 720"
        class="absolute inset-0 h-full w-full select-none"
        preserveAspectRatio="xMidYMid slice"
      >
        <defs>
          <linearGradient id="skyGrad" x1="0" x2="0" y1="0" y2="1">
            <stop offset="0%" stopColor="#42C8FF" />
            <stop offset="35%" stopColor="#67D9FF" />
            <stop offset="68%" stopColor="#9CEAFF" />
            <stop offset="100%" stopColor="#EAFBFF" />
          </linearGradient>
          <linearGradient id="hillFarGrad" x1="0" x2="0" y1="0" y2="1">
            <stop offset="0%" stopColor="#1C4648" />
            <stop offset="100%" stopColor="#102B2D" />
          </linearGradient>
          <linearGradient id="hillMidGrad" x1="0" x2="0" y1="0" y2="1">
            <stop offset="0%" stopColor="#2A613E" />
            <stop offset="100%" stopColor="#193B26" />
          </linearGradient>
          <linearGradient id="hillNearGrad" x1="0" x2="0" y1="0" y2="1">
            <stop offset="0%" stopColor="#4A9E46" />
            <stop offset="100%" stopColor="#2E6D2B" />
          </linearGradient>
          <linearGradient id="cowHighlightGrad" x1="0" x2="0" y1="0" y2="1">
            <stop offset="0%" stopColor="#FFF2D6" stopOpacity="0" />
            <stop offset="100%" stopColor="#FFA6A6" stopOpacity="0.45" />
          </linearGradient>
          <linearGradient id="moonGrad" x1="0" x2="0" y1="0" y2="1">
            <stop offset="0%" stopColor="#FFFFFF" />
            <stop offset="100%" stopColor="#F2F7FF" />
          </linearGradient>
          <filter id="moonGlow" x="-30%" y="-30%" width="160%" height="160%">
            <feGaussianBlur stdDeviation="16" result="blur" />
            <feComposite in="SourceGraphic" in2="blur" operator="over" />
          </filter>
          <filter id="softShadow" x="-15%" y="-15%" width="130%" height="130%">
            <feDropShadow dx="0" dy="10" stdDeviation="8" floodColor="#000000" floodOpacity="0.25" />
          </filter>
        </defs>

        <!-- --- Layer 1: Sky Canvas backdrop --- -->
        <rect width="1200" height="720" fill="url(#skyGrad)" />

        <!-- --- Layer 2: Moving clouds & birds --- -->
        <g class="cloud-fast" style="transform: translateY(25px) scale(0.85)">
          <ellipse cx="140" cy="80" rx="140" ry="40" fill="white" opacity="0.9" />
          <ellipse cx="280" cy="95" rx="120" ry="45" fill="white" opacity="0.85" />
          <ellipse cx="200" cy="115" rx="200" ry="45" fill="rgba(255, 255, 255, 0.95)" />
        </g>
        <g class="cloud-slow" style="transform: translateY(95px) scale(0.65)">
          <ellipse cx="880" cy="90" rx="150" ry="45" fill="white" opacity="0.9" />
          <ellipse cx="1020" cy="105" rx="110" ry="40" fill="white" opacity="0.8" />
          <ellipse cx="940" cy="120" rx="180" ry="45" fill="rgba(255, 255, 255, 0.95)" />
        </g>

        <g class="bird-fly-group">

          <path class="bird-wing-path" d="M26 0 Q38 -14 50 0" stroke="#FFFFFF" stroke-width="3" fill="none" stroke-linecap="round" />
        </g>
        <g class="bird-fly-group" style="animation-delay: 2.8s; transform: translateY(55px) scale(0.8)">
          <path class="bird-wing-path" d="M0 0 Q12 -14 26 0" stroke="#FFFFFF" stroke-width="3" fill="none" stroke-linecap="round" />
          <path class="bird-wing-path" d="M26 0 Q38 -14 50 0" stroke="#FFFFFF" stroke-width="3" fill="none" stroke-linecap="round" />
        </g>

        <!-- --- Layer 3: Mosque background silhouette --- -->
        <g opacity="0.15" fill="#1C3854">
          <!-- Left Minaret -->
          <rect x="740" y="300" width="22" height="150" rx="2" />
          <path d="M 733 300 L 751 210 L 769 300 Z" />
          <rect x="732" y="315" width="38" height="10" rx="1" />
          
          <!-- Right Minaret -->
          <rect x="1100" y="240" width="28" height="210" rx="2" />
          <path d="M 1091 240 L 1114 135 L 1137 240 Z" />
          <rect x="1088" y="265" width="52" height="12" rx="1" />
          <rect x="1088" y="345" width="52" height="12" rx="1" />

          <!-- Domes -->

          <path d="M 925 320 Q 930 286 935 320 Z" />
          <path d="M 765 450 C 765 375, 792 355, 822 355 C 852 355, 879 375, 879 450 Z" />
          <path d="M 818 355 Q 822 330 826 355 Z" />

          <path d="M 834 450 L 834 432 C 834 422, 850 422, 850 432 L 850 450 Z" fill="#0B1A26" />
          <path d="M 1038 450 L 1038 432 C 1038 422, 1054 422, 1054 432 L 1054 450 Z" fill="#0B1A26" />
        </g>

        <!-- --- Layer 4: Distant Hills --- -->
        <path d="M -100 480 Q 280 410 650 440 T 1300 410 L 1300 720 L -100 720 Z" fill="url(#hillFarGrad)" />

        <!-- --- Layer 5: Mid Ground Hills --- -->

        <!-- Grass Details -->

        <path d="M 1000 675 Q 1004 664 1000 658 Q 1010 666 1015 675 Z" fill="#2C6D2B" />

        <path d="M 1020 735 C 1060 660, 1120 660, 1150 735 Z" fill="#153622" />
        <path d="M 1090 735 C 1130 670, 1190 670, 1220 735 Z" fill="#1B422B" />

        <!-- --- Layer 7: Golden Eid Moon Greeting --- -->

          <!-- Eid Greeting Text -->

        <!-- --- Layer 8: Walk & Comedy Action Scene --- -->
        <g class="walk-scene-container">
          <!-- Cow's flat shadow on grass (doesn't bob) -->
          <ellipse cx="500" cy="672" rx="275" ry="15" fill="rgba(0, 0, 0, 0.2)" />

          <!-- Man's ground shadow (fades out at 42% as he gets kicked into the sky) -->

          <!-- Action FX pop-ups -->

          <text class="kick-label font-black" x="220" y="440" fontSize="58" fill="#FF2626" stroke="#FFFFFF" stroke-width="8" paint-order="stroke" text-anchor="middle">KICK!</text>
          
          <path class="motion-lines" d="M 310 580 A 100 100 0 0 0 210 650" fill="none" stroke="#FFFFFF" stroke-width="6" stroke-linecap="round" stroke-dasharray="100" />
          
          <g class="dust-cloud">
            <circle cx="210" cy="655" r="16" fill="#E6DAB8" opacity="0.8" />
            <circle cx="236" cy="662" r="12" fill="#F0E5C8" opacity="0.8" />
            <circle cx="185" cy="666" r="10" fill="#E6DAB8" opacity="0.8" />
          </g>

          <!-- --- Character: ReferenceStyleMan --- -->
          <g class="man-fly-group" filter="url(#softShadow)">
            <!-- Arms (Farthest Arm A) -->
            <g class="man-arm-a">
              <path d="M 130 470 C 110 500, 100 530, 110 560 L 130 560 C 120 530, 130 500, 145 470 Z" fill="#E8EEF2" />
              <circle cx="118" cy="570" r="10" fill="#FFC4A8" />
            </g>

            <!-- Legs (Farthest Leg A) -->
            <g class="man-leg-a">
              <path d="M 135 575 C 130 610, 125 640, 130 670 L 160 670 C 165 640, 160 610, 155 575 Z" fill="#005C66" />
              <path d="M 133 670 L 133 685 L 157 685 L 157 670 Z" fill="#FFC4A8" />

  <!-- --- Simple Vanilla JavaScript for Replaying --- -->
  <script>
    const replayBtn = document.getElementById('replayBtn');
    replayBtn.addEventListener('click', () => {
      const section = document.getElementById('canvasSection');
      
      // Clone the section to force the browser to completely re-render and re-apply animations
      const newSection = section.cloneNode(true);
      section.parentNode.replaceChild(newSection, section);
      
      // Re-assign listeners since cloneNode doesn't clone event listeners
      // (though here we only need to bind the replayBtn itself which is outside the canvasSection)
    });
  </script>
